# Cloud Build config — triggered on push to main branch
# Required substitutions: _REGION (default us-central1)
# Set via Cloud Build trigger or: gcloud builds submit --substitutions _REGION=us-central1
substitutions:
  _REGION: us-central1
  _SERVICE_NAME: urap-engine

steps:
  # 1. Build Docker image
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - deploy/Dockerfile
      - -t
      - gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$COMMIT_SHA
      - -t
      - gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest
      - .
    id: build

  # 2. Push both tags
  - name: gcr.io/cloud-builders/docker
    args: [push, gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$COMMIT_SHA]
    id: push-sha
    waitFor: [build]

  - name: gcr.io/cloud-builders/docker
    args: [push, gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest]
    id: push-latest
    waitFor: [build]

  # 3. Deploy to Cloud Run
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=10
      - --concurrency=80
    id: deploy
    waitFor: [push-sha]

images:
  - gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$COMMIT_SHA
  - gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
